<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Authentication Failed</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        border: 1px solid #333;
        border-radius: 8px;
        text-align: center;
        max-width: 400px;
        overflow: hidden;
      }
      .error-section {
        background: #3a1e1e;
        padding: 3rem 4rem;
      }
      .footer-section {
        background: #242424;
        padding: 1.5rem 4rem;
      }
      .error-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        background: #5a2d2d;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-icon svg {
        width: 32px;
        height: 32px;
        stroke: #ef5350;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
      }
      h2 {
        color: #ef5350;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0;
      }
      p {
        color: #a0a0a0;
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-section">
        <div class="error-icon">
          <svg viewBox="0 0 24 24">
            <line
              x1="6"
              y1="6"
              x2="18"
              y2="18"
            ></line>
            <line
              x1="18"
              y1="6"
              x2="6"
              y2="18"
            ></line>
          </svg>
        </div>
        <h2>Authentication Failed</h2>
      </div>
      <div class="footer-section">
        <p>Provisioning callback failed. Return to your terminal and retry the login flow.</p>
      </div>
    </div>
  </body>
</html>
